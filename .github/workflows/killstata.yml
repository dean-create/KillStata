name: killstata

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  killstata:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /killstata') ||
      startsWith(github.event.comment.body, '/killstata')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run killstata
        uses: anomalyco/killstata/github@latest
        env:
          KILLSTATA_API_KEY: ${{ secrets.KILLSTATA_API_KEY }}
          KILLSTATA_PERMISSION: '{"bash": "deny"}'
        with:
          model: killstata/claude-opus-4-5
