preload = ["@opentui/solid/preload"]

[test]
preload = ["./test/preload.ts"]
timeout = 10000  # 10 seconds (default is 5000ms)
# 默认关闭 coverage：在本套件规模下，bun 的 coverage 插桩有一个报告器竞态，会把某些
# 测试的失败错误归属到其他测试上，制造出「随机跳动、总数还对不上」的假失败
# （关闭后连跑多次稳定 131 pass 0 fail；开启则每次报 1-3 个不同的假失败）。
# 需要覆盖率报告时单独跑：`bun test --coverage`。
coverage = false
